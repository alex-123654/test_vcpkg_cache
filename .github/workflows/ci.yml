name: ci

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  X_VCPKG_NUGET_ID: ${{ secrets.X_VCPKG_NUGET_ID }}
  X_VCPKG_NUGET_API_KEY: ${{ secrets.X_VCPKG_NUGET_API_KEY }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-2025-vs2026
            preset: win-x64-vcpkg

          - name: ubuntu
            os: ubuntu-24.04
            preset: linux-x64-vcpkg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\extern\vcpkg\bootstrap-vcpkg.bat

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Bootstrap vcpkg on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./extern/vcpkg/bootstrap-vcpkg.sh

      - name: Check tools
        shell: bash
        run: |
          cmake --version
          ninja --version || true

      - name: Configure
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: bash
        run: |
          cmake --build --preset ${{ matrix.preset }}