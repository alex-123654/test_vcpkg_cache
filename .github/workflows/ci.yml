name: ci

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  X_VCPKG_NUGET_ID: ${{ github.actor }}
  X_VCPKG_NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-2025-vs2026
            preset: win-x64-vcpkg
            bootstrap: .\extern\vcpkg\bootstrap-vcpkg.bat
            shell: pwsh

          - name: ubuntu
            os: ubuntu-22.04
            preset: linux-x64-vcpkg
            bootstrap: ./extern/vcpkg/bootstrap-vcpkg.sh
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: ${{ matrix.shell }}
        run: ${{ matrix.bootstrap }}

      - name: Configure
        shell: ${{ matrix.shell }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: ${{ matrix.shell }}
        run: cmake --build --preset ${{ matrix.preset }}