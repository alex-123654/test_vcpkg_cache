name: ci

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  X_VCPKG_NUGET_ID: ${{ secrets.X_VCPKG_NUGET_ID }}
  X_VCPKG_NUGET_API_KEY: ${{ secrets.X_VCPKG_NUGET_API_KEY }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-2025-vs2026
            preset: win-x64-vcpkg
            vc_arch: x64

          - name: ubuntu
            os: ubuntu-24.04
            preset: linux-x64-vcpkg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\extern\vcpkg\bootstrap-vcpkg.bat

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Bootstrap vcpkg on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./extern/vcpkg/bootstrap-vcpkg.sh

      - name: Check tools
        shell: bash
        run: |
          cmake --version
          ninja --version || true

      - name: Locate Visual Studio
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $json = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -format json
          $vs = ($json | ConvertFrom-Json)[0]

          $vsRoot = $vs.installationPath
          $major = [int]($vs.installationVersion.Split('.')[0])

          if ($major -ge 15) {
              $vcvarsall = Join-Path $vsRoot "VC\Auxiliary\Build\vcvarsall.bat"
          }
          elseif ($major -eq 14 -or $major -eq 12) {
              $vcvarsall = Join-Path $vsRoot "VC\vcvarsall.bat"
          }
          else {
              throw "Unsupported Visual Studio major version: $major"
          }

          if (!(Test-Path $vcvarsall)) {
              throw "vcvarsall.bat not found: $vcvarsall"
          }

          "VCVARSALL=$vcvarsall" >> $env:GITHUB_ENV
          Write-Host "VCVARSALL=$vcvarsall"

      - name: Configure on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%VCVARSALL%" ${{ matrix.vc_arch }}
          cmake --preset ${{ matrix.preset }}

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%VCVARSALL%" ${{ matrix.vc_arch }}
          cmake --build --preset ${{ matrix.preset }}

      - name: Configure on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }}

      - name: Build on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake --build --preset ${{ matrix.preset }}